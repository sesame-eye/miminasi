<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静穏空間ジェネレーター (デジタル耳栓)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2c2c2e;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #fff; margin: 0 0 5px 0; }
        .subtitle { font-size: 14px; color: #aeaeae; margin-bottom: 25px; }
        
        button {
            font-size: 18px; font-weight: bold; padding: 18px;
            border: none; border-radius: 16px; cursor: pointer;
            width: 100%; margin-top: 10px; transition: all 0.2s;
        }
        #startBtn { background-color: #34c759; color: white; }
        #startBtn:active { transform: scale(0.98); background-color: #28a745; }
        #stopBtn { background-color: #ff3b30; color: white; }
        #stopBtn:active { transform: scale(0.98); background-color: #dc3545; }
        #stopBtn:disabled { background-color: #48484a; color: #8e8e93; cursor: not-allowed; }
        
        .control-panel {
            margin-top: 25px;
            padding: 18px;
            background-color: #1c1c1e;
            border-radius: 16px;
            text-align: left;
        }
        .control-group { margin-bottom: 15px; }
        .control-group:last-child { margin-bottom: 0; }
        label { display: block; font-size: 14px; font-weight: bold; color: #aeaeae; }
        input[type="range"] { width: 100%; margin-top: 6px; }
        .value-disp { float: right; font-weight: bold; color: #34c759; }
        #status { margin-top: 20px; font-size: 14px; color: #aeaeae; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤫 静穏空間メーカー</h1>
    <div class="subtitle">Web Audio デジタル耳栓実験機</div>
    
    <button id="startBtn">▶ 静穏モード 起動</button>
    <button id="stopBtn" disabled>■ 停止</button>
    
    <div class="control-panel">
        <!-- 位相コントロール -->
        <div class="control-group">
            <label>ノイズ相殺（位相設定）: <span id="phaseVal" class="value-disp">逆位相 (ANC)</span></label>
            <input type="range" id="phaseSlider" min="0" max="1" step="1" value="1">
        </div>

        <!-- ピンポイント遮断ノッチフィルター -->
        <div class="control-group">
            <label>不快音 狙い撃ちカット: <span id="notchVal" class="value-disp">120 Hz</span></label>
            <input type="range" id="notchSlider" min="50" max="1000" step="5" value="120">
        </div>

        <!-- スルー音量（耳栓の隙間から通す音の量） -->
        <div class="control-group">
            <label>環境音の透過レベル: <span id="volumeVal" class="value-disp">0.10 倍</span></label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.10">
        </div>
    </div>
    
    <div id="status">システム停止中</div>
</div>

<script>
let audioCtx = null;
let mediaStreamSource = null;
let localStream = null;
let phaseGain = null;
let notchFilter = null;
let outputGain = null;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');

const phaseSlider = document.getElementById('phaseSlider');
const phaseVal = document.getElementById('phaseVal');
const notchSlider = document.getElementById('notchSlider');
const notchVal = document.getElementById('notchVal');
const volumeSlider = document.getElementById('volumeSlider');
const volumeVal = document.getElementById('volumeVal');

// 位相切り替え
phaseSlider.addEventListener('input', (e) => {
    const isInverse = parseInt(e.target.value) === 1;
    phaseVal.innerText = isInverse ? "逆位相 (ANC)" : "正相 (通常)";
    if (audioCtx && phaseGain) {
        // 逆位相なら -1.0、正相なら 1.0 を乗算して波形をひっくり返す
        phaseGain.gain.setValueAtTime(isInverse ? -1.0 : 1.0, audioCtx.currentTime);
    }
});

// ノッチフィルター周波数変更
notchSlider.addEventListener('input', (e) => {
    const val = e.target.value;
    notchVal.innerText = val + " Hz";
    if (audioCtx && notchFilter) {
        notchFilter.frequency.setValueAtTime(parseFloat(val), audioCtx.currentTime);
    }
});

// ボリューム変更
volumeSlider.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value).toFixed(2);
    volumeVal.innerText = val + " 倍";
    if (audioCtx && outputGain) {
        outputGain.gain.setValueAtTime(parseFloat(val), audioCtx.currentTime);
    }
});

startBtn.addEventListener('click', async () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
            video: false 
        });

        mediaStreamSource = audioCtx.createMediaStreamSource(localStream);

        // 1. ノッチフィルター（指定した周波数だけを極端に急峻に削り落とす）
        notchFilter = audioCtx.createBiquadFilter();
        notchFilter.type = "notch";
        notchFilter.Q.value = 10.0; // 値が大きいほど、ピンポイントにその音だけを削る
        notchFilter.frequency.value = notchSlider.value;

        // 2. 位相反転ノード（GainNodeをマイナスにすることで波形を反転）
        phaseGain = audioCtx.createGain();
        phaseGain.gain.value = parseInt(phaseSlider.value) === 1 ? -1.0 : 1.0;

        // 3. 最終出力音量調整（耳栓としての透過度）
        outputGain = audioCtx.createGain();
        outputGain.gain.value = parseFloat(volumeSlider.value);

        // 接続: マイク ＞ ノッチフィルター ＞ 位相反転 ＞ 音量調整 ＞ スピーカー/イヤホン
        mediaStreamSource.connect(notchFilter);
        notchFilter.connect(phaseGain);
        phaseGain.connect(outputGain);
        outputGain.connect(audioCtx.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.innerText = "🟩 静穏システム作動中...";
        statusText.style.color = "#34c759";
    } catch (err) {
        console.error(err);
        statusText.innerText = "エラー: マイクの起動に失敗しました。";
        statusText.style.color = "#ff3b30";
    }
});

stopBtn.addEventListener('click', () => {
    if (localStream) localStream.getTracks().forEach(track => track.stop());
    if (mediaStreamSource) mediaStreamSource.disconnect();
    if (notchFilter) notchFilter.disconnect();
    if (phaseGain) phaseGain.disconnect();
    if (outputGain) outputGain.disconnect();
    
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "システム停止中";
    statusText.style.color = "#aeaeae";
});
</script>
</body>
</html>
